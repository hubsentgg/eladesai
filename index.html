<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elades AI — Enhanced Learning and Decision Expert System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Ambient background canvas of drifting synapse particles -->
<canvas id="bg-field"></canvas>

<!-- ============ LANDING VIEW ============ -->
<section id="view-landing" class="view view-active">

  <nav class="nav">
    <div class="brand">
      <div class="orb orb--nav" id="orb-nav" aria-hidden="true">
        <div class="orb__core"></div>
        <div class="orb__ring orb__ring--1"></div>
        <div class="orb__ring orb__ring--2"></div>
      </div>
      <span class="brand__name">Elades <span class="brand__ai">AI</span></span>
    </div>
    <div class="nav__right">
      <button class="lang-toggle" id="lang-toggle" aria-label="Toggle language">
        <span class="lang-toggle__opt is-active" data-lang-opt="en">EN</span>
        <span class="lang-toggle__divider">/</span>
        <span class="lang-toggle__opt" data-lang-opt="ro">RO</span>
      </button>
    </div>
  </nav>

  <header class="hero">
    <div class="hero__orb-wrap">
      <div class="orb orb--hero" id="orb-hero" aria-hidden="true">
        <div class="orb__core"></div>
        <div class="orb__ring orb__ring--1"></div>
        <div class="orb__ring orb__ring--2"></div>
        <div class="orb__ring orb__ring--3"></div>
        <svg class="orb__synapses" viewBox="0 0 200 200">
          <g stroke="var(--gold)" stroke-width="0.6" fill="none" opacity="0.55">
            <path d="M100,100 L40,60" />
            <path d="M100,100 L160,55" />
            <path d="M100,100 L150,150" />
            <path d="M100,100 L45,145" />
            <path d="M100,100 L100,20" />
          </g>
          <g fill="var(--gold)">
            <circle cx="40" cy="60" r="2.4"/>
            <circle cx="160" cy="55" r="2.4"/>
            <circle cx="150" cy="150" r="2.4"/>
            <circle cx="45" cy="145" r="2.4"/>
            <circle cx="100" cy="20" r="2.4"/>
          </g>
        </svg>
      </div>
    </div>

    <p class="hero__eyebrow" data-i18n="hero.eyebrow">an expert system that learns as it listens</p>
    <h1 class="hero__title">
      <span class="hero__title-line" data-i18n="hero.title1">Enhanced Learning</span>
      <span class="hero__title-line hero__title-line--accent" data-i18n="hero.title2">&amp; Decision Expert System</span>
    </h1>

    <div class="rhyme-ticker" id="rhyme-ticker" aria-live="polite">
      <p class="rhyme-ticker__line" id="rhyme-line"></p>
    </div>

    <button class="cta" id="btn-enter">
      <span data-i18n="hero.cta">Begin the conversation</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </header>

  <section class="cards" id="oracle-cards">
    <!-- cards injected by script.js from slogan bank -->
  </section>

  <footer class="landing-footer">
    <p data-i18n="footer.tagline">Elades AI · thinks in two tongues, remembers on your own machine</p>
  </footer>
</section>

<!-- ============ CHAT VIEW ============ -->
<section id="view-chat" class="view">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar__top">
      <button class="icon-btn" id="btn-back" aria-label="Back to home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="new-chat-btn" id="btn-new-chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span data-i18n="sidebar.new">New conversation</span>
      </button>
    </div>
    <div class="sidebar__list" id="conversation-list"></div>
    <div class="sidebar__bottom">
      <button class="lang-toggle lang-toggle--sidebar" id="lang-toggle-2">
        <span class="lang-toggle__opt is-active" data-lang-opt="en">EN</span>
        <span class="lang-toggle__divider">/</span>
        <span class="lang-toggle__opt" data-lang-opt="ro">RO</span>
      </button>
    </div>
  </aside>

  <main class="chat">
    <div class="chat__header">
      <div class="orb orb--small" id="orb-chat-header" aria-hidden="true">
        <div class="orb__core"></div>
        <div class="orb__ring orb__ring--1"></div>
      </div>
      <div class="chat__header-text">
        <span class="chat__header-name">Elades AI</span>
        <span class="chat__header-status" id="chat-status" data-i18n="chat.status">ready to think with you</span>
      </div>
      <button class="icon-btn icon-btn--danger" id="btn-clear" data-i18n-title="chat.clear" title="Delete this conversation">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="chat__messages" id="chat-messages"></div>

    <div class="attach-tray" id="attach-tray"></div>

    <form class="composer" id="composer">
      <button type="button" class="plus-btn" id="btn-plus" aria-label="Attach files">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <input type="file" id="file-input" multiple hidden accept="image/*,.pdf,.txt,.doc,.docx,.csv,.md">
      <textarea id="msg-input" rows="1" data-i18n-placeholder="chat.placeholder" placeholder="Ask Elades anything…"></textarea>
      <button type="submit" class="send-btn" id="btn-send" aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>
  </main>
</section>

<script src="script.js"></script>
</body>
</html>
